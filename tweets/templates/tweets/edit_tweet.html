{% extends 'base.html' %}
{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">Tweet</p>
        <h1>Edit tweet</h1>
    </div>
</header>

<form method="post" enctype="multipart/form-data" class="form-panel">
    {% csrf_token %}
    {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}
    {{ form.as_p }}
    <div class="form-actions">
        <button type="submit" class="btn">Save changes</button>
        <a href="{% if next_url %}{{ next_url }}{% else %}{% url 'tweets:all_tweets' %}{% endif %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
