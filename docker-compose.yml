services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n_feed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-n_feed}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      mc mb -p local/${AWS_STORAGE_BUCKET_NAME:-n-feed-media} || true;
      mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME:-n-feed-media} || true;
      "

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${COMPOSE_DJANGO_SECRET_KEY:-unsafe-compose-secret-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_COOKIE_SECURE: "False"
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-n_feed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      USE_S3_STORAGE: ${USE_S3_STORAGE:-False}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-n-feed-media}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-path}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}
      MEDIA_THUMBNAIL_MAX_SIZE: ${MEDIA_THUMBNAIL_MAX_SIZE:-512}
    volumes:
      - media:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py configure_periodic_tasks &&
             daphne -b 0.0.0.0 -p 8000 twitmain.asgi:application"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/readyz/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build: .
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${COMPOSE_DJANGO_SECRET_KEY:-unsafe-compose-secret-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_COOKIE_SECURE: "False"
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-n_feed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      USE_S3_STORAGE: ${USE_S3_STORAGE:-False}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-n-feed-media}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-path}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}
      MEDIA_THUMBNAIL_MAX_SIZE: ${MEDIA_THUMBNAIL_MAX_SIZE:-512}
    volumes:
      - media:/app/media
    command: celery -A twitmain worker -l info
    healthcheck:
      test: ["CMD-SHELL", "celery -A twitmain inspect ping --timeout=5 | grep -q pong"]
      interval: 15s
      timeout: 10s
      retries: 5

  celery-beat:
    build: .
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${COMPOSE_DJANGO_SECRET_KEY:-unsafe-compose-secret-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_COOKIE_SECURE: "False"
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-n_feed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      USE_S3_STORAGE: ${USE_S3_STORAGE:-False}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-n-feed-media}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-path}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}
      MEDIA_THUMBNAIL_MAX_SIZE: ${MEDIA_THUMBNAIL_MAX_SIZE:-512}
    volumes:
      - media:/app/media
    command: celery -A twitmain beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      test: ["CMD-SHELL", "python manage.py shell -c \"from django_celery_beat.models import PeriodicTask; PeriodicTask.objects.count() >= 0\""]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/media:ro
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  minio_data:
  media:
