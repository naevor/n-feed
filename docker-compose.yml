services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n_feed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-n_feed}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DJANGO_ENV: prod
      DJANGO_SECRET_KEY: ${COMPOSE_DJANGO_SECRET_KEY:-unsafe-compose-secret-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_COOKIE_SECURE: "False"
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-n_feed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
    volumes:
      - media:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn twitmain.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/media:ro
    ports:
      - "8000:80"

volumes:
  pg_data:
  redis_data:
  media:
