{% extends 'base.html' %}

{% block title %}Editing profile{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">Account</p>
        <h1>Editing profile</h1>
    </div>
</header>
<div class="form-container form-panel">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Save</button>
    </form>
    <a href="{% url 'users:profile' request.user.username %}" class="btn btn-secondary">Back to profile</a>
</div>
{% endblock %}
