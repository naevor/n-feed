{% extends 'base.html' %}

{% block title %}Editing profile{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">Account</p>
        <h1>Edit profile</h1>
    </div>
</header>
<section class="form-container form-panel">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn">Save changes</button>
            <a href="{% url 'users:profile' request.user.username %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
