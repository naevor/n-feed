{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Login</h1>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
    </form>
    <p class="muted">Don't have an account? <a href="{% url 'users:register' %}">Register</a></p>
</section>
{% endblock %}
